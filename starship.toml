"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 30
command_timeout = 1200

format = """
${custom.krb_banner}\
[](#3B4252)\
$username\
$hostname\
[](bg:#434C5E fg:#3B4252)\
$directory\
[](fg:#434C5E bg:#33658A)\
$time\
[ ](fg:#33658A)\
"""

[username]
show_always = true
style_user = "bg:#3B4252 fg:#ECEFF4"
style_root = "bg:#3B4252 fg:#ECEFF4"
format = '[$user]($style)'

[hostname]
ssh_only = false
trim_at = "."
style = "bg:#3B4252 fg:#ECEFF4"
format = '[@$hostname ]($style)'

[directory]
style = "bg:#434C5E fg:#ECEFF4"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A fg:#ECEFF4"
format = '[ $time ]($style)'

[custom.krb_banner]
when = "klist -s >/dev/null 2>&1"
shell = ["bash", "--noprofile", "--norc"]
unsafe_no_escape = true
command = '''
klist_out="$(LC_ALL=C klist 2>/dev/null)"
principal="$(printf '%s\n' "$klist_out" | awk -F': ' '/^Default principal:/ {print $2; exit}')"
expires_raw="$(printf '%s\n' "$klist_out" | awk '/ krbtgt\// {print $3 " " $4; exit}')"

[ -n "$principal" ] || exit 1
[ -n "$expires_raw" ] || exit 1

expires_epoch="$(LC_ALL=C date -d "$expires_raw" +%s 2>/dev/null || true)"
[ -n "$expires_epoch" ] || exit 1

now_epoch="$(date +%s)"
remaining="$((expires_epoch - now_epoch))"
[ "$remaining" -gt 0 ] || exit 1

days="$((remaining / 86400))"
hours="$(((remaining % 86400) / 3600))"
minutes="$(((remaining % 3600) / 60))"
ttl="$(printf '%02d:%02d:%02d' "$days" "$hours" "$minutes")"

reset=$'\033[0m'
fg_light=$'\033[38;2;236;239;244m'
fg_dark=$'\033[38;2;46;52;64m'
fg_label=$'\033[38;2;107;81;23m'
fg_ident=$'\033[38;2;135;103;29m'
fg_ttl=$'\033[38;2;168;132;36m'
fg_time=$'\033[38;2;224;184;90m'
bg_label=$'\033[48;2;107;81;23m'
bg_ident=$'\033[48;2;135;103;29m'
bg_ttl=$'\033[48;2;168;132;36m'
bg_time=$'\033[48;2;224;184;90m'

printf '%s%s%s Kerberos %s%s%s%s %s %s%s%s%s TTL %s%s%s%s %s %s%s%s\n' \
  "$fg_label" "$bg_label" \
  "$fg_light" \
  "$fg_label" "$bg_ident" \
  "$fg_light" "$bg_ident" "$principal" \
  "$fg_ident" "$bg_ttl" \
  "$fg_dark" "$bg_ttl" \
  "$fg_ttl" "$bg_time" \
  "$fg_dark" "$bg_time" "$ttl" \
  "$reset" "$fg_time" "$reset"
'''
format = "$output\n"
